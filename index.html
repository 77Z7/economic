
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Economic Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 위젯 내부의 링크 기능을 활성화하고 마우스 커서를 포인터로 변경 */
        .widget-wrapper { position: relative; cursor: pointer; }
    </style>
</head>
<body class="bg-[#131722] text-gray-300 font-sans">

    <header class="border-b border-gray-800 py-8 px-10 bg-[#1e222d] shadow-2xl">
        <h1 class="text-3xl font-extrabold text-white tracking-tight">글로벌 경제 실시간 지표</h1>
        <p class="text-sm text-gray-400 mt-2 font-medium">항목을 클릭하면 상세 차트로 이동합니다 (Powered by TradingView)</p>
    </header>

    <main class="container mx-auto py-10 px-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            
            <div class="bg-[#1e222d] p-6 rounded-xl border border-gray-800 shadow-lg">
                <h2 class="text-xl font-bold mb-6 text-blue-400 flex items-center">
                    <span class="mr-2">📈</span> 주요 증시 및 금리
                </h2>
                <div class="tradingview-widget-container widget-wrapper">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                    {
                      "colorTheme": "dark",
                      "dateRange": "12M",
                      "showChart": false,
                      "locale": "ko",
                      "width": "100%",
                      "height": "480",
                      "largeChartUrl": "https://www.tradingview.com/chart/", 
                      "isTransparent": true,
                      "showSymbolLogo": true,
                      "tabs": [
                        {
                          "title": "주요 지표",
                          "symbols": [
                            { "s": "NASDAQ:IXIC", "d": "나스닥 종합" },
                            { "s": "SPAZ:SPX", "d": "S&P 500" },
                            { "s": "DJ:DJI", "d": "다우 존스" },
                            { "s": "KRX:KOSPI", "d": "코스피" },
                            { "s": "KRX:KOSDAQ", "d": "코스닥" },
                            { "s": "TVC:US10Y", "d": "미국 10년물 국채 금리" },
                            { "s": "TVC:US02Y", "d": "미국 2년물 국채 금리" },
                            { "s": "ECONOMICS:KRINTR", "d": "한국 기준금리" },
                            { "s": "TVC:KR03Y", "d": "한국 3년물 국채 금리" },
                            { "s": "TVC:DXY", "d": "달러 인덱스" }
                          ]
                        }
                      ]
                    }
                    </script>
                </div>
            </div>

            <div class="bg-[#1e222d] p-6 rounded-xl border border-gray-800 shadow-lg">
                <h2 class="text-xl font-bold mb-6 text-green-400 flex items-center">
                    <span class="mr-2">💎</span> 환율 및 에너지/원자재
                </h2>
                <div class="tradingview-widget-container widget-wrapper">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                    {
                      "colorTheme": "dark",
                      "dateRange": "12M",
                      "showChart": false,
                      "locale": "ko",
                      "width": "100%",
                      "height": "480",
                      "largeChartUrl": "https://www.tradingview.com/chart/",
                      "isTransparent": true,
                      "showSymbolLogo": true,
                      "tabs": [
                        {
                          "title": "환율/원자재",
                          "symbols": [
                            { "s": "FX_IDC:USDKRW", "d": "원/달러 환율" },
                            { "s": "FX:USDJPY", "d": "엔/달러 환율" },
                            { "s": "FX:EURUSD", "d": "유로/달러 환율" },
                            { "s": "NYMEX:CL1!", "d": "WTI 원유 선물" },
                            { "s": "ICEORB:BZ1!", "d": "브렌트유 선물" },
                            { "s": "OANDA:XAUUSD", "d": "금 (Gold)" },
                            { "s": "OANDA:XAGUSD", "d": "은 (Silver)" },
                            { "s": "COMEX:HG1!", "d": "구리 선물" },
                            { "s": "NYMEX:NG1!", "d": "천연가스 선물" },
                            { "s": "BITSTAMP:BTCUSD", "d": "비트코인 (USD)" }
                          ]
                        }
                      ]
                    }
                    </script>
                </div>
            </div>

        </div>
    </main>

    <footer class="text-center py-12 text-gray-600 text-xs border-t border-gray-800 mt-10">
        <p>© 2024 My Economic Dashboard. All data via TradingView API.</p>
        <p class="mt-2">티커를 클릭하면 트레이딩뷰 차트 사이트로 연결됩니다.</p>
    </footer>

</body>
</html>
